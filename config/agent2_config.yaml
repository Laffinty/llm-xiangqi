# Agent2 (MiMo) 配置 - 黑方
agent:
  name: "Agent2"
  color: "Black"
  description: "MiMo-V2-Flash powered player"
  system_prompt_file: "prompts/agent_default.txt"
  max_retries: 3
  retry_delay: 2
  use_tools: false
  use_reflection: false

llm:
  provider: "mimo"
  model: "mimo-v2-flash"
  api_key: "${MIMO_API_KEY}"  # 请设置环境变量 MIMO_API_KEY
  base_url: "https://api.xiaomimimo.com/v1"
  temperature: 0.7
  max_tokens: 2048
  timeout: 60
