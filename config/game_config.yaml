# 游戏全局配置
game:
  initial_fen: "rnbakabnr/9/1c5c1/p1p1p1p1p/9/9/P1P1P1P1P/1C5C1/9/RNBAKABNR w - - 0 1"
  time_control:
    enabled: false
    seconds_per_turn: 60
  max_turns: 200

mcp_tools:
  enabled: true
  tools_dir: "src/mcp_tools/tools"
  auto_discover: true
  pikafish:
    enabled: false
    path: "engines/pikafish.exe"
    depth: 15
    threads: 4

logging:
  level: "INFO"
  file: "logs/game.log"
  console: true

gui:
  3d: false
  web_3d: true

  # Web 3D 服务器配置
  web_3d_config:
    host: "0.0.0.0"               # 绑定地址
    port: 8080                    # 服务端口
    auto_open_browser: true       # 自动打开浏览器
    static_dir: "src/web_3d/static"  # 静态文件目录

    # 渲染配置
    rendering:
      shadow_map_size: 2048
      default_camera_position: [8, 12, 12]
      animation_duration: 0.5    # 秒