# Agent1 (DeepSeek) 配置 - 红方
agent:
  name: "Agent1"
  color: "Red"
  description: "DeepSeek powered player"
  system_prompt_file: "prompts/agent_default.txt"
  max_retries: 3
  retry_delay: 2
  use_tools: false
  use_reflection: false

llm:
  provider: "deepseek"
  model: "deepseek-chat"
  api_key: "${DEEPSEEK_API_KEY}"  # 请设置环境变量 DEEPSEEK_API_KEY
  base_url: "https://api.deepseek.com"
  temperature: 0.7
  max_tokens: 2048
  timeout: 30
